<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Brutalist shadow -->
  <rect x="14" y="14" width="40" height="42" fill="#000000" />
  <!-- Vellum paper base -->
  <rect x="6" y="6" width="40" height="42" fill="#faf6ee" stroke="#000000" stroke-width="4" stroke-linejoin="miter" />
  <!-- Text lines -->
  <line x1="14" y1="18" x2="36" y2="18" stroke="#000000" stroke-width="4" stroke-linecap="square" />
  <line x1="14" y1="28" x2="38" y2="28" stroke="#000000" stroke-width="4" stroke-linecap="square" />
  <line x1="14" y1="38" x2="26" y2="38" stroke="#000000" stroke-width="4" stroke-linecap="square" />
  <!-- Yellow accent square -->
  <rect x="34" y="36" width="6" height="6" fill="#ffd60a" stroke="#000000" stroke-width="3" />
</svg>
